<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title} + ' - 宮崎アイスホッケー連盟 県予算システム'">Miyazaki Ice Hockey</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/style.css?v=3" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">宮崎アイスホッケー連盟 県予算システム <span class="badge bg-secondary ms-2" th:text="${@environment.getProperty('app.version')}">v1.5.0</span></a>
            
            <ul class="navbar-nav flex-row gap-3 ms-4 me-auto d-none d-md-flex">
                <li class="nav-item">
                    <a class="nav-link px-2" th:classappend="${activePage == 'projects'} ? 'active fw-bold text-white' : 'text-white-50'" href="/activity">📄 活動一覧・入力</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link px-2" th:classappend="${activePage == 'export'} ? 'active fw-bold text-white' : 'text-white-50'" href="/export">🖨️ 提出データ出力・集計</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link px-2" th:classappend="${activePage == 'members'} ? 'active fw-bold text-white' : 'text-white-50'" href="/members">👥 名簿マスタ管理</a>
                </li>
            </ul>

            <div class="dropdown ms-auto me-2">
                <button class="btn btn-outline-light btn-sm dropdown-toggle" type="button" data-bs-toggle="dropdown">
                    <span th:text="${activeUser != null ? '操作: ' + activeUser.name : '操作ユーザー未設定'}">操作ユーザー</span>
                </button>
                <ul class="dropdown-menu dropdown-menu-end">
                    <li th:each="u : ${users}">
                        <form method="post" th:action="@{/users/switch}" style="display:inline;">
                            <input type="hidden" name="userId" th:value="${u.id}">
                            <input type="hidden" name="redirect" th:value="${currentRequestUri}">
                            <button type="submit" class="dropdown-item"
                                    th:classappend="${activeUser != null and activeUser.id == u.id} ? 'fw-bold'"
                                    th:text="${u.name}">ユーザー名</button>
                        </form>
                    </li>
                    <li><hr class="dropdown-divider"></li>
                    <li>
                        <a class="dropdown-item text-success"
                           th:href="@{/users/new(redirect=${currentRequestUri})}">＋ 新規登録</a>
                    </li>
                    <li th:if="${activeUser != null}">
                        <a class="dropdown-item text-primary"
                           th:href="@{/users/edit/{id}(id=${activeUser.id},redirect=${currentRequestUri})}">編集</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container-fluid">
        <div class="row">
            <main class="col-12 px-md-4 main-content">
                <div th:replace="${content}"></div>
            </main>
        </div>
    </div>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <div class="position-fixed bottom-0 end-0 p-2 text-muted fw-bold" style="font-size: 0.8rem; z-index: 1050; pointer-events: none; opacity: 0.6;">Miyazaki IceHockey <span th:text="${@environment.getProperty('app.version')}">vX.X.X</span></div>
</body>
</html>
