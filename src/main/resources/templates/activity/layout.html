<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="html(title, content, activePage)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title} + ' | 宮崎アイスホッケー連盟'">宮崎アイスホッケー連盟</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; }
        .navbar-brand { font-weight: 700; }
        .app-navbar .nav-link { color: rgba(255,255,255,.85); }
        .app-navbar .nav-link.active, .app-navbar .nav-link:hover { color: #fff; }
        .section-header { font-weight: 600; }
        .main-wrap { max-width: 1200px; margin: 0 auto; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand app-navbar px-3 px-md-4">
        <a class="navbar-brand text-white" href="/activity">宮崎アイスホッケー連盟</a>
        <ul class="navbar-nav me-auto">
            <li class="nav-item">
                <a class="nav-link" th:classappend="${activePage == 'list'} ? 'active'" href="/activity">活動一覧</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" th:classappend="${activePage == 'new'} ? 'active'" href="/activity/new">活動日入力</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" th:classappend="${activePage == 'members'} ? 'active'" href="/members">名簿管理</a>
            </li>
        </ul>
        <!-- 操作ユーザー切替 -->
        <div class="dropdown me-2">
            <button class="btn btn-outline-light btn-sm dropdown-toggle" type="button" data-bs-toggle="dropdown">
                <span th:text="${activeUser != null ? '操作: ' + activeUser.name : '操作ユーザー未設定'}">操作ユーザー</span>
            </button>
            <ul class="dropdown-menu dropdown-menu-end">
                <li th:each="u : ${users}">
                    <form method="post" th:action="@{/users/switch}" style="display:inline;">
                        <input type="hidden" name="userId" th:value="${u.id}">
                        <input type="hidden" name="redirect" th:value="${currentRequestUri}">
                        <button type="submit" class="dropdown-item"
                                th:classappend="${activeUser != null and activeUser.id == u.id} ? 'fw-bold'"
                                th:text="${u.name}">ユーザー名</button>
                    </form>
                </li>
                <li><hr class="dropdown-divider"></li>
                <li>
                    <a class="dropdown-item text-success"
                       th:href="@{/users/new(redirect=${currentRequestUri})}">＋ 新規登録</a>
                </li>
                <li th:if="${activeUser != null}">
                    <a class="dropdown-item text-primary"
                       th:href="@{/users/edit/{id}(id=${activeUser.id},redirect=${currentRequestUri})}">編集</a>
                </li>
            </ul>
        </div>
        <a href="/" class="btn btn-outline-light btn-sm">ログアウト</a>
    </nav>

    <div class="container-fluid py-4">
        <div class="main-wrap">
            <div th:replace="${content}"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <div class="position-fixed bottom-0 end-0 p-2 text-muted fw-bold" style="font-size: 0.8rem; z-index: 1050; pointer-events: none; opacity: 0.6;">Miyazaki IceHockey <span th:text="${@environment.getProperty('app.version')}">vX.X.X</span></div>
</body>
</html>
