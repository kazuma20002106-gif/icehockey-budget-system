<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: html(title='活動一覧', content=~{::div}, activePage='projects')}">
<body>
<style>
.sticky-table-wrap { max-height: 62vh; overflow-y: auto; }
.sticky-table-wrap thead th { position: sticky; top: 0; z-index: 2; background: #fff; box-shadow: 0 1px 0 #dee2e6; }
</style>
<div>
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3 class="fw-bold mb-0">活動一覧</h3>
        <a href="/activity/new" class="btn btn-primary btn-lg">＋ 新規入力</a>
    </div>

    <!-- 絞り込み -->
    <form method="get" action="/activity" class="card border-0 shadow-sm p-3 mb-3">
        <div class="row g-2 align-items-end">
            <div class="col-auto">
                <label class="form-label small text-muted mb-1">年度</label>
                <select name="year" class="form-select">
                    <option th:each="y : ${years}" th:value="${y}" th:text="${y} + '年度'"
                            th:selected="${y == selectedYear}"></option>
                </select>
            </div>
            <div class="col-auto" style="min-width: 220px;">
                <label class="form-label small text-muted mb-1">補助金区分</label>
                <select name="budgetTypeId" class="form-select">
                    <option value="" th:selected="${selectedBudgetTypeId == null}">全区分</option>
                    <option th:each="bt : ${budgetTypes}" th:value="${bt.id}" th:text="${bt.name}"
                            th:selected="${bt.id == selectedBudgetTypeId}"></option>
                </select>
            </div>
            <div class="col-auto">
                <label class="form-label small text-muted mb-1">月</label>
                <select name="month" class="form-select">
                    <option value="" th:selected="${selectedMonth == null}">全て</option>
                    <option value="4"  th:selected="${selectedMonth == 4}">4月</option>
                    <option value="5"  th:selected="${selectedMonth == 5}">5月</option>
                    <option value="6"  th:selected="${selectedMonth == 6}">6月</option>
                    <option value="7"  th:selected="${selectedMonth == 7}">7月</option>
                    <option value="8"  th:selected="${selectedMonth == 8}">8月</option>
                    <option value="9"  th:selected="${selectedMonth == 9}">9月</option>
                    <option value="10" th:selected="${selectedMonth == 10}">10月</option>
                    <option value="11" th:selected="${selectedMonth == 11}">11月</option>
                    <option value="12" th:selected="${selectedMonth == 12}">12月</option>
                    <option value="1"  th:selected="${selectedMonth == 1}">1月</option>
                    <option value="2"  th:selected="${selectedMonth == 2}">2月</option>
                    <option value="3"  th:selected="${selectedMonth == 3}">3月</option>
                </select>
            </div>
            <div class="col-auto">
                <button type="submit" class="btn btn-outline-secondary">絞り込み</button>
            </div>
            <div class="col text-end">
                <a class="btn btn-success"
                   th:href="@{/activity/export/year(year=${selectedYear}, budgetTypeId=${selectedBudgetTypeId}, month=${selectedMonth})}">
                    年度まとめExcel出力
                </a>
            </div>
        </div>
    </form>

    <!-- 一覧テーブル -->
    <div class="card border-0 shadow-sm mb-3">
        <div class="table-responsive sticky-table-wrap">
            <table class="table table-hover align-middle mb-0">
                <thead class="text-muted">
                    <tr>
                        <th class="ps-3">活動日</th>
                        <th>補助金区分</th>
                        <th>種別</th>
                        <th>事業名</th>
                        <th>会場</th>
                        <th class="text-end">参加人数</th>
                        <th class="text-end">支出合計</th>
                        <th class="text-center">操作</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="row : ${rows}">
                        <td class="ps-3" th:text="${#temporals.format(row.project.eventDate, 'yyyy/MM/dd')}">2026/06/06</td>
                        <td>
                            <span class="badge rounded-pill" th:classappend="'text-bg-' + ${row.budgetColor}"
                                  th:text="${row.budgetLabel}">①選手強化費</span>
                        </td>
                        <td th:text="${row.project.targetCategory}">成年男子</td>
                        <td th:text="${row.project.name}">強化練習</td>
                        <td th:text="${row.project.locationVenue}">会場</td>
                        <td class="text-end"><span th:text="${row.participantCount}">1</span> 名</td>
                        <td class="text-end fw-bold"><span th:text="${#numbers.formatInteger(row.expenseTotal, 0, 'COMMA')}">0</span> 円</td>
                        <td class="text-center text-nowrap">
                            <a th:href="@{/activity/{id}/edit(id=${row.project.id})}"
                               class="btn btn-sm btn-outline-primary" title="編集">編集</a>
                            <div class="btn-group btn-group-sm">
                                <button type="button" class="btn btn-outline-success dropdown-toggle"
                                        data-bs-toggle="dropdown" aria-expanded="false" title="Excel出力">出力</button>
                                <ul class="dropdown-menu dropdown-menu-end">
                                    <li>
                                        <form method="post" action="/export/preview" class="d-inline">
                                            <input type="hidden" name="projectIds" th:value="${row.project.id}">
                                            <input type="hidden" name="exportType" value="all">
                                            <button type="submit" class="dropdown-item">まとめて（2-4〜2-6）</button>
                                        </form>
                                    </li>
                                    <li><hr class="dropdown-divider"></li>
                                    <li>
                                        <form method="post" action="/export/preview" class="d-inline">
                                            <input type="hidden" name="projectIds" th:value="${row.project.id}">
                                            <input type="hidden" name="exportType" value="2-4">
                                            <button type="submit" class="dropdown-item">様式2-4 のみ</button>
                                        </form>
                                    </li>
                                    <li>
                                        <form method="post" action="/export/preview" class="d-inline">
                                            <input type="hidden" name="projectIds" th:value="${row.project.id}">
                                            <input type="hidden" name="exportType" value="2-5">
                                            <button type="submit" class="dropdown-item">様式2-5 のみ</button>
                                        </form>
                                    </li>
                                    <li>
                                        <form method="post" action="/export/preview" class="d-inline">
                                            <input type="hidden" name="projectIds" th:value="${row.project.id}">
                                            <input type="hidden" name="exportType" value="2-6">
                                            <button type="submit" class="dropdown-item">様式2-6 のみ</button>
                                        </form>
                                    </li>
                                </ul>
                            </div>
                            <button type="button" class="btn btn-sm btn-outline-danger" title="削除"
                                    th:onclick="|confirmDelete(${row.project.id})|">削除</button>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(rows)}">
                        <td colspan="8" class="text-center text-muted py-4">該当する活動がありません。</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- 集計フッター -->
    <div class="card border-0 shadow-sm">
        <div class="row text-center py-3 g-0">
            <div class="col border-end">
                <div class="text-muted small">活動件数</div>
                <div class="fs-4 fw-bold"><span th:text="${totalCount}">3</span> 件</div>
            </div>
            <div class="col border-end">
                <div class="text-muted small">延べ参加人数</div>
                <div class="fs-4 fw-bold"><span th:text="${totalParticipants}">4</span> 名</div>
            </div>
            <div class="col">
                <div class="text-muted small">支出合計</div>
                <div class="fs-4 fw-bold text-primary"><span th:text="${#numbers.formatInteger(grandTotal, 0, 'COMMA')}">0</span> 円</div>
            </div>
        </div>
    </div>

    <!-- 削除用の隠しフォーム -->
    <form id="deleteForm" method="post" style="display:none;"></form>
    <script>
        function confirmDelete(id) {
            Swal.fire({
                title: '本当に削除しますか？',
                text: 'この操作は元に戻せません。',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#dc3545',
                cancelButtonColor: '#6c757d',
                confirmButtonText: '削除する',
                cancelButtonText: 'キャンセル',
                reverseButtons: true
            }).then((result) => {
                if (result.isConfirmed) {
                    const f = document.getElementById('deleteForm');
                    f.action = '/activity/' + id + '/delete';
                    f.submit();
                }
            });
        }
    </script>
</div>
</body>
</html>
