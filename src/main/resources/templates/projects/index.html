<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: html(title='事業管理', content=~{::div}, activePage='projects')}">
<body>
    <div>
        <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
            <h1 class="h2">事業（プロジェクト）管理</h1>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addModal">新規事業登録</button>
        </div>
        <div class="table-responsive">
            <table class="table table-hover table-striped shadow-sm">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>事業名</th>
                        <th>期日</th>
                        <th>場所</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="project : ${projects}">
                        <td th:text="${project.id}"></td>
                        <td th:text="${project.name}"></td>
                        <td th:text="${project.eventDate}"></td>
                        <td th:text="${project.locationVenue}"></td>
                        <td>
                            <a th:href="@{/projects/{id}(id=${project.id})}" class="btn btn-sm btn-outline-primary">経費入力・詳細</a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(projects)}">
                        <td colspan="5" class="text-center">登録されている事業がありません。</td>
                    </tr>
                </tbody>
            </table>
        </div>
        
        <!-- Add Modal -->
        <div class="modal fade" id="addModal" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content">
                    <form th:action="@{/projects/add}" method="post">
                        <div class="modal-header">
                            <h5 class="modal-title">新規事業登録</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>
                        <div class="modal-body">
                            <div class="mb-3">
                                <label class="form-label d-block">事業区分</label>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="name" id="cat1" value="強化選手" required checked>
                                    <label class="form-check-label" for="cat1">強化選手</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="name" id="cat2" value="トップチーム" required>
                                    <label class="form-check-label" for="cat2">トップチーム</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="name" id="cat3" value="ふるさと" required>
                                    <label class="form-check-label" for="cat3">ふるさと</label>
                                </div>
                            </div>
                            
                            <!-- Hidden default values to satisfy database constraints for now -->
                            <input type="hidden" name="targetCategory" value="" />
                            <input type="hidden" name="eventDate" th:value="${#dates.format(#dates.createNow(), 'yyyy-MM-dd')}" />
                            <input type="hidden" name="budgetTypeId" value="1" />
                        </div>
                        <div class="modal-footer">
                            <button type="submit" class="btn btn-primary">登録して詳細へ</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
