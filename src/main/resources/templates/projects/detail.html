<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: html(title='事業詳細・一括入力', content=~{::div}, activePage='projects')}">
<body>
    <div>
        <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
            <h1 class="h2" th:text="${project.name}">事業名</h1>
            <div>
                <a th:href="@{/projects/{id}/export(id=${project.id})}" class="btn btn-success">Excelダウンロード</a>
                <a href="/projects" class="btn btn-secondary">戻る</a>
            </div>
        </div>

        <div class="row mb-4">
            <div class="col-md-12">
                <div class="card p-3 shadow-sm border-0 bg-light">
                    <h5 class="mb-0 text-secondary"><i class="bi bi-info-circle me-2"></i>様式2-6入力モード： <strong th:text="${project.name}"></strong></h5>
                </div>
            </div>
        </div>

        <form th:action="@{/projects/{id}/save(id=${project.id})}" th:object="${form}" method="post" id="projectForm">
            <!-- 事業全体経費は2-6にはないため一時的に非表示（Hiddenで保持） -->
            <input type="hidden" th:field="*{summary.projectId}" />
            <input type="hidden" th:field="*{summary.rentalCost}" />
            <input type="hidden" th:field="*{summary.suppliesCost}" />
            <input type="hidden" th:field="*{summary.parkingCost}" />
            <input type="hidden" th:field="*{summary.compensationCost}" />
            <input type="hidden" th:field="*{summary.serviceCost}" />

            <!-- 参加者と個人経費 (Participants and Expenses) -->
            <div class="card mb-4 shadow-sm border-success">
                <div class="card-header bg-success text-white d-flex justify-content-between align-items-center">
                    <h5 class="mb-0"><i class="bi bi-person-lines-fill me-2"></i>参加者・領収明細（様式2-6ベース）</h5>
                    <button type="button" class="btn btn-sm btn-light text-success fw-bold" onclick="addParticipantRow()">＋ 行を追加</button>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover table-bordered mb-0 align-middle" id="participantsTable" style="min-width: 1200px;">
                            <thead class="table-light text-center align-middle">
                                <tr class="text-nowrap">
                                    <th style="width: 12%;">氏名<br><small class="text-muted">（名簿選択）</small></th>
                                    <th style="width: 10%;">期日</th>
                                    <th style="width: 12%;">交通手段</th>
                                    <th style="width: 14%;">区間<br><small class="text-muted">（〇〇〜〇〇）</small></th>
                                    <th style="width: 7%;">距離<br><small class="text-muted">（km）</small></th>
                                    <th style="width: 9%;">交通費</th>
                                    <th style="width: 9%;">宿泊費</th>
                                    <th style="width: 9%;">雑費</th>
                                    <th style="width: 10%;">受領日</th>
                                    <th style="width: 8%;">削除<br><small class="text-muted">（行消去）</small></th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="p, stat : *{participants}" class="participant-row">
                                    <td>
                                        <input type="hidden" th:name="|participants[${stat.index}].id|" th:value="${p.id}" />
                                        <input type="hidden" th:name="|expenses[${stat.index}].id|" th:value="*{expenses[__${stat.index}__].id}" />
                                        <input type="hidden" th:name="|participants[${stat.index}].isAccommodated|" th:value="*{expenses[__${stat.index}__].accommodationCost > 0 ? 'true' : 'false'}" />
                                        <input type="text" class="form-control form-control-sm" th:name="|participants[${stat.index}].memberName|" th:value="*{participants[__${stat.index}__].member != null ? participants[__${stat.index}__].member.name : participants[__${stat.index}__].memberName}" list="memberList" autocomplete="off" onchange="autoFillRoute(this)">
                                    </td>
                                    <td><input type="date" class="form-control form-control-sm" th:name="|expenses[${stat.index}].expenseDate|" th:value="*{expenses[__${stat.index}__].expenseDate}"></td>
                                    <td>
                                        <select class="form-select form-select-sm" th:name="|expenses[${stat.index}].transportMethod|">
                                            <option value="">選択...</option>
                                            <option value="航空機・バス" th:selected="*{expenses[__${stat.index}__].transportMethod == '航空機・バス'}">航空機・バス</option>
                                            <option value="電車・車" th:selected="*{expenses[__${stat.index}__].transportMethod == '電車・車'}">電車・車</option>
                                        </select>
                                    </td>
                                    <td>
                                        <div class="input-group input-group-sm">
                                            <input type="text" class="form-control text-center px-1" placeholder="出発" onchange="updateRoute(this)">
                                            <span class="input-group-text px-1">～</span>
                                            <input type="text" class="form-control text-center px-1" placeholder="到着" onchange="updateRoute(this)">
                                            <input type="hidden" th:name="|expenses[${stat.index}].transportRoute|" class="route-hidden" th:value="*{expenses[__${stat.index}__].transportRoute}">
                                        </div>
                                    </td>
                                    <td><input type="number" class="form-control form-control-sm text-end" th:name="|expenses[${stat.index}].transportDistanceKm|" th:value="*{expenses[__${stat.index}__].transportDistanceKm}"></td>
                                    <td><input type="number" class="form-control form-control-sm text-end" th:name="|expenses[${stat.index}].transportCost|" th:value="*{expenses[__${stat.index}__].transportCost}" min="0" step="1000" oninput="calculateTotals()"></td>
                                    <td><input type="number" class="form-control form-control-sm text-end" th:name="|expenses[${stat.index}].accommodationCost|" th:value="*{expenses[__${stat.index}__].accommodationCost}" min="0" step="1000" oninput="calculateTotals()"></td>
                                    <td><input type="number" class="form-control form-control-sm text-end" th:name="|expenses[${stat.index}].miscellaneousCost|" th:value="*{expenses[__${stat.index}__].miscellaneousCost}" min="0" step="1000" oninput="calculateTotals()"></td>
                                    <td><input type="date" class="form-control form-control-sm" th:name="|expenses[${stat.index}].receiptDate|" th:value="*{expenses[__${stat.index}__].receiptDate}"></td>
                                    <td class="text-center">
                                        <button type="button" class="btn btn-sm btn-outline-danger" onclick="removeRow(this)"><i class="bi bi-trash"></i></button>
                                    </td>
                                </tr>
                            </tbody>
                            <tfoot class="table-light fw-bold text-end">
                                <tr>
                                    <td colspan="5" class="text-center">合計</td>
                                    <td id="totalTransport">0</td>
                                    <td id="totalAccommodation">0</td>
                                    <td id="totalMisc">0</td>
                                    <td colspan="2" class="text-center text-primary">総合計: <span id="grandTotal">0</span> 円</td>
                                </tr>
                            </tfoot>
                        </table>
                    </div>
                </div>
            </div>

            <div class="d-grid gap-2 d-md-flex justify-content-md-end mb-5">
                <button type="submit" class="btn btn-primary btn-lg shadow px-5">保存して出力へ</button>
            </div>
        </form>
        <!-- Hidden Template for new rows -->
        <table style="display:none;">
            <tbody id="rowTemplate">
                <tr class="participant-row">
                    <td>
                        <input type="hidden" name="participants[INDEX].isAccommodated" value="false" />
                        <input type="text" class="form-control form-control-sm" name="participants[INDEX].memberName" list="memberList" autocomplete="off" onchange="autoFillRoute(this)">
                    </td>
                    <td><input type="date" class="form-control form-control-sm" name="expenses[INDEX].expenseDate"></td>
                    <td>
                        <select class="form-select form-select-sm" name="expenses[INDEX].transportMethod">
                            <option value="">選択...</option>
                            <option value="航空機・バス">航空機・バス</option>
                            <option value="電車・車">電車・車</option>
                        </select>
                    </td>
                    <td>
                        <div class="input-group input-group-sm">
                            <input type="text" class="form-control text-center px-1" placeholder="出発" onchange="updateRoute(this)">
                            <span class="input-group-text px-1">～</span>
                            <input type="text" class="form-control text-center px-1" placeholder="到着" onchange="updateRoute(this)">
                            <input type="hidden" name="expenses[INDEX].transportRoute" class="route-hidden">
                        </div>
                    </td>
                    <td><input type="number" class="form-control form-control-sm text-end" name="expenses[INDEX].transportDistanceKm"></td>
                    <td><input type="number" class="form-control form-control-sm text-end" name="expenses[INDEX].transportCost" value="0" min="0" step="1000" oninput="calculateTotals()"></td>
                    <td><input type="number" class="form-control form-control-sm text-end" name="expenses[INDEX].accommodationCost" value="0" min="0" step="1000" oninput="calculateTotals()"></td>
                    <td><input type="number" class="form-control form-control-sm text-end" name="expenses[INDEX].miscellaneousCost" value="0" min="0" step="1000" oninput="calculateTotals()"></td>
                    <td><input type="date" class="form-control form-control-sm" name="expenses[INDEX].receiptDate"></td>
                    <td class="text-center"><button type="button" class="btn btn-sm btn-outline-danger" onclick="removeRow(this)"><i class="bi bi-trash"></i></button></td>
                </tr>
            </tbody>
        </table>

        <datalist id="memberList">
            <option th:each="m : ${members}" th:value="${m.name}"></option>
        </datalist>

        <script th:inline="javascript">
            /*<![CDATA[*/
            const membersData = /*[[${members}]]*/ [];
            /*]]>*/

            function updateRoute(inputElem) {
                const group = inputElem.closest('.input-group');
                const inputs = group.querySelectorAll('input[type="text"]');
                const hidden = group.querySelector('.route-hidden');
                const from = inputs[0].value || '';
                const to = inputs[1].value || '';
                if (from || to) {
                    hidden.value = from + '～' + to;
                } else {
                    hidden.value = '';
                }
            }

            function autoFillRoute(inputElem) {
                const row = inputElem.closest('tr');
                const group = row.querySelector('.route-hidden').closest('.input-group');
                if (!group) return;

                const name = inputElem.value;
                const member = membersData.find(m => m.name === name);
                
                if (member && member.departurePoint) {
                    const inputs = group.querySelectorAll('input[type="text"]');
                    if (!inputs[0].value) {
                        inputs[0].value = member.departurePoint;
                        updateRoute(inputs[0]);
                    }
                }
            }

            function initRoutes() {
                document.querySelectorAll('.route-hidden').forEach(hidden => {
                    if (hidden.value) {
                        const parts = hidden.value.split(/～|〜/);
                        const group = hidden.closest('.input-group');
                        if (group && parts.length > 0) {
                            const inputs = group.querySelectorAll('input[type="text"]');
                            inputs[0].value = parts[0] || '';
                            if (parts.length > 1) {
                                inputs[1].value = parts[1] || '';
                            }
                        }
                    }
                });
            }

            function addParticipantRow() {
                const table = document.getElementById('participantsTable').getElementsByTagName('tbody')[0];
                const rows = table.getElementsByClassName('participant-row');
                const newIndex = rows.length;
                
                let defaultDate = '';
                if (rows.length > 0) {
                    const firstDateInput = rows[0].querySelector('input[type="date"]');
                    if (firstDateInput) {
                        defaultDate = firstDateInput.value;
                    }
                }
                
                let template = document.getElementById('rowTemplate').innerHTML;
                template = template.replace(/INDEX/g, newIndex);
                
                table.insertAdjacentHTML('beforeend', template);

                if (defaultDate) {
                    const newRow = table.lastElementChild;
                    const newDateInput = newRow.querySelectorAll('input[type="date"]')[0];
                    if (newDateInput) {
                        newDateInput.value = defaultDate;
                    }
                }
            }

            function removeRow(btn) {
                btn.closest('tr').remove();
                calculateTotals();
            }

            function calculateTotals() {
                let transport = 0, accommodation = 0, misc = 0;
                
                // Get only rows in the main table, not the hidden template
                const rows = document.getElementById('participantsTable').getElementsByTagName('tbody')[0].getElementsByClassName('participant-row');
                
                Array.from(rows).forEach(row => {
                    const tCost = row.querySelector('input[name*=".transportCost"]');
                    const aCost = row.querySelector('input[name*=".accommodationCost"]');
                    const mCost = row.querySelector('input[name*=".miscellaneousCost"]');
                    
                    if (tCost && tCost.value) {
                        const v = parseInt(tCost.value, 10);
                        if (!isNaN(v)) transport += v;
                    }
                    if (aCost && aCost.value) {
                        const v = parseInt(aCost.value, 10);
                        if (!isNaN(v)) accommodation += v;
                    }
                    if (mCost && mCost.value) {
                        const v = parseInt(mCost.value, 10);
                        if (!isNaN(v)) misc += v;
                    }
                });
                
                document.getElementById('totalTransport').innerText = transport.toLocaleString();
                document.getElementById('totalAccommodation').innerText = accommodation.toLocaleString();
                document.getElementById('totalMisc').innerText = misc.toLocaleString();
                document.getElementById('grandTotal').innerText = (transport + accommodation + misc).toLocaleString();
            }

            // Auto-add an empty row if the table is completely empty
            (function() {
                const tableBody = document.getElementById('participantsTable').getElementsByTagName('tbody')[0];
                let rowCount = 0;
                for(let i=0; i<tableBody.children.length; i++) {
                    if(tableBody.children[i].tagName === 'TR') {
                        rowCount++;
                    }
                }
                if (rowCount === 0) {
                    addParticipantRow();
                }
                initRoutes();
                calculateTotals();
            })();
        </script>
    </div>
</body>
</html>
