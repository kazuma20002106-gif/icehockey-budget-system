<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: html(title='提出データ出力・集計', content=~{::div}, activePage='export')}">
<body>
    <div>
        <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-4 border-bottom">
            <h1 class="h2">提出データ出力・集計</h1>
        </div>

        <!-- 蓄積状況のサマリー -->
        <div class="row mb-4">
            <div class="col-md-6">
                <div class="card text-white bg-primary mb-3 shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title">登録済み事業数</h5>
                        <p class="card-text fs-2 fw-bold" th:text="${projects.size()} + ' 件'"></p>
                    </div>
                </div>
            </div>
            <!-- In a complete app, we'd add total costs etc. here -->
        </div>

        <div class="card shadow-sm">
            <div class="card-header bg-white d-flex justify-content-between align-items-center">
                <h5 class="mb-0">出力する事業の選択（範囲指定）</h5>
            </div>
            <div class="card-body">
                <form th:action="@{/export/download}" method="post" id="exportForm">
                    <div class="table-responsive mb-4">
                        <table class="table table-hover table-striped border">
                            <thead class="table-light">
                                <tr>
                                    <th>
                                        <input class="form-check-input" type="checkbox" id="selectAll" onclick="toggleAll(this)" checked>
                                    </th>
                                    <th>ID</th>
                                    <th>事業名</th>
                                    <th>期日</th>
                                    <th>場所</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="project : ${projects}">
                                    <td>
                                        <input class="form-check-input project-cb" type="checkbox" name="projectIds" th:value="${project.id}" checked>
                                    </td>
                                    <td th:text="${project.id}"></td>
                                    <td th:text="${project.name}"></td>
                                    <td th:text="${project.eventDate}"></td>
                                    <td th:text="${project.locationVenue}"></td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(projects)}">
                                    <td colspan="5" class="text-center">登録されている事業がありません。</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <div class="row align-items-center bg-light p-3 rounded">
                        <div class="col-md-auto">
                            <strong>出力する様式を選択：</strong>
                        </div>
                        <div class="col-md-auto">
                            <select name="exportType" class="form-select w-auto" required>
                                <option value="2-4">様式2-4 (事業実施報告書)</option>
                                <option value="2-5">様式2-5 (参加者名簿)</option>
                                <option value="2-6">様式2-6 (事業別領収書)</option>
                                <option value="2-2">様式2-2 (年間収支報告書 ※選択した事業を合算)</option>
                            </select>
                        </div>
                        <div class="col-md-auto ms-auto">
                            <button type="submit" class="btn btn-primary btn-lg shadow-sm">専用ファイルをダウンロード</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        function toggleAll(source) {
            checkboxes = document.getElementsByClassName('project-cb');
            for(var i=0, n=checkboxes.length;i<n;i++) {
                checkboxes[i].checked = source.checked;
            }
        }
    </script>
</body>
</html>
