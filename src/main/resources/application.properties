spring.application.name=budget-system

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/budget_system?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Tokyo&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=Kazuma0307
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# App Version
app.version=v1.9.9

# Initialize database schema using schema.sql
spring.sql.init.mode=always
spring.sql.init.encoding=UTF-8

# MyBatis Configuration
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.type-aliases-package=com.miyazaki.icehockey.budgetsystem.model

# Thymeleaf cache
spring.thymeleaf.cache=false

# Logging
logging.level.com.miyazaki.icehockey.budgetsystem=DEBUG
